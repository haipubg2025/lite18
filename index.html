<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrix Lite v1</title>
    <script>
      // --- Console Shield: Chặn các thông báo rác từ hệ thống/trình duyệt ngay lập tức ---
      (function() {
        const suppressedKeywords = [
          'Origin trial',
          'language-model',
          'writer',
          'rewriter',
          'proofreader',
          'preloaded using link preload but not used',
          'Unrecognized feature',
          'Mixed Content',
          '[vite] connecting...',
          'modules transformed.',
          'Use of eval in',
          'rendering chunks...',
          'computing gzip size...',
          'dist/index.html',
          'dist/assets/',
          'Some chunks are larger than',
          'Using dynamic import()',
          'Use build.rollupOptions.output.manualChunks',
          'Adjust chunk size limit for this warning',
          'built in',
          'dist/server.cjs',
          'dist/server.cjs.map',
          'Done in',
          'Build successful.',
          'CONNECTED',
          'Render Start',
          'Render End'
        ];

        const filter = (args, originalFn) => {
          const msg = args.map(arg => (typeof arg === 'string' ? arg : JSON.stringify(arg))).join(' ');
          if (suppressedKeywords.some(keyword => msg.toLowerCase().includes(keyword.toLowerCase()))) {
            return;
          }
          originalFn.apply(console, args);
        };

        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;

        console.log = (...args) => filter(args, originalLog);
        console.warn = (...args) => filter(args, originalWarn);
        console.error = (...args) => filter(args, originalError);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
